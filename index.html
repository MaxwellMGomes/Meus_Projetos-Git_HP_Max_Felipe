<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simula Servidor Conta Azul</title>
</head>
<body>
   <h1>Redirecionando Conta Azul</h1>
    <!-- O conteúdo do PHP será inserido aqui -->
    <div id="conteudo-php">Carregando...</div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Chama o arquivo PHP assim que a página carregar
            fetch('Conta_Azul_Servidor.php')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('conteudo-php').innerHTML = data;
                })
                .catch(error => console.error('Erro:', error));
        });
    </script>
</body>
</html>
